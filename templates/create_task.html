<!DOCTYPE html>
<html>
<head>
    <title>Create Task — TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width:520px;">
        <h4 class="mb-1">✅ Create Task</h4>
        <p class="text-muted mb-4 small">Admin only</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Design homepage" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description <small class="text-muted">(optional)</small></label>
                <textarea name="description" class="form-control" rows="3" placeholder="Task details..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Assign To</label>
                <select name="assigned_to" class="form-select" required>
                    <option value="" disabled selected>Select a team member</option>
                    {% for user in users %}
                    <option value="{{ user.email }}">{{ user.name }} ({{ user.email }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            {% if projects %}
            <div class="mb-3">
                <label class="form-label">Project <small class="text-muted">(optional)</small></label>
                <select name="project_id" class="form-select">
                    <option value="">— No project —</option>
                    {% for p in projects %}
                    <option value="{{ p._id }}">{{ p.project_name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" name="due_date" class="form-control" required>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success">Create Task</button>
                <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
