<!DOCTYPE html>
<html>
<head>
    <title>Create Project — TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width:500px;">
        <h4 class="mb-1">📁 Create Project</h4>
        <p class="text-muted mb-4 small">Admin only</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Project Name</label>
                <input type="text" name="project_name" class="form-control" placeholder="e.g. Website Redesign" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description <small class="text-muted">(optional)</small></label>
                <textarea name="description" class="form-control" rows="3" placeholder="What is this project about?"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary">Create Project</button>
                <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
