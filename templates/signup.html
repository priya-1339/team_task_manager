<!DOCTYPE html>
<html>
<head>
    <title>Signup — TaskManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width:420px;">
        <h2 class="text-center mb-1">🗂 TaskManager</h2>
        <p class="text-center text-muted mb-4">Create a new account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <small class="text-muted">(min 6 chars)</small></label>
                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password', this)">👁</button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('confirm_password', this)">👁</button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select" id="roleSelect" onchange="toggleAdminKey()">
                    <option value="member" selected>Member</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="mb-3" id="adminKeyField" style="display:none;">
                <label class="form-label">Admin Key</label>
                <div class="input-group">
                    <input type="password" name="admin_key" id="admin_key" class="form-control" placeholder="Enter admin key">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('admin_key', this)">👁</button>
                </div>
            </div>
            <button class="btn btn-success w-100">Create Account</button>
        </form>

        <p class="mt-3 text-center text-muted">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>

<script>
function toggleAdminKey() {
    const role = document.getElementById('roleSelect').value;
    const adminKeyField = document.getElementById('adminKeyField');
    adminKeyField.style.display = role === 'admin' ? 'block' : 'none';
}

function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    if (field.type === 'password') {
        field.type = 'text';
        btn.textContent = '🙈';
    } else {
        field.type = 'password';
        btn.textContent = '👁';
    }
}
</script>

</body>
</html>
